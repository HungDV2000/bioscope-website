services:
  db:
    image: postgres:16-alpine
    container_name: dvcms-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: dvcms
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dvcms}
      POSTGRES_DB: dvcms
    ports:
      - "127.0.0.1:${DVCMS_DB_HOST_PORT:-26432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dvcms"]
      interval: 5s
      timeout: 5s
      retries: 10

  cms:
    build:
      context: .
      dockerfile: apps/core-cms/Dockerfile
    container_name: dvcms-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URI: postgres://dvcms:${POSTGRES_PASSWORD:-dvcms}@db:5432/dvcms
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:-please-change-this-to-a-long-random-secret}
      PAYLOAD_PUBLIC_SERVER_URL: ${PAYLOAD_PUBLIC_SERVER_URL:-https://cms.bioscope.vn}
      FRONTEND_URL: ${FRONTEND_URL:-https://web.bioscope.vn}
      REVALIDATE_SECRET: ${REVALIDATE_SECRET:-}
      B2B_COOKIE: ${B2B_COOKIE:-bio-token}
      NODE_ENV: production
      NODE_OPTIONS: --no-deprecation
      PORT: "3001"
    ports:
      - "127.0.0.1:${DVCMS_CMS_HOST_PORT:-26001}:3001"
    volumes:
      - media:/app/apps/core-cms/media
    profiles: ["full"]

  frontend:
    build:
      context: .
      dockerfile: apps/bioscope-frontend/Dockerfile
      args:
        NEXT_PUBLIC_CMS_URL: ${NEXT_PUBLIC_CMS_URL:-https://cms.bioscope.vn}
    container_name: dvcms-frontend
    restart: unless-stopped
    depends_on:
      cms:
        condition: service_started
    environment:
      PORT: "3000"
    ports:
      - "127.0.0.1:${DVCMS_FRONTEND_HOST_PORT:-26000}:3000"
    profiles: ["full"]

volumes:
  pgdata:
  media:
