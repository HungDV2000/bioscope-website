# aaPanel — snippet bổ sung (nếu đã có location / từ Reverse proxy UI)
# Đặt TRƯỚC block cache ảnh: location ~ .*\.(gif|jpg|jpeg|png|...
#
# QUAN TRỌNG: Phải có location / proxy về 127.0.0.1:26000 — thiếu block này → trang lỗi.
# Xem file đầy đủ: aapanel-nginx-web.bioscope.vn.conf

location ^~ /_next/ {
    proxy_pass http://127.0.0.1:26000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location ^~ /images/ {
    proxy_pass http://127.0.0.1:26000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /logo.avif {
    proxy_pass http://127.0.0.1:26000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# BẮT BUỘC nếu chưa có từ aaPanel Reverse proxy:
location / {
    proxy_pass http://127.0.0.1:26000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}
