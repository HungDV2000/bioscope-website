services:
  db:
    image: postgres:16-alpine
    container_name: dvstrapi-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: dvcms
      POSTGRES_PASSWORD: dvcms
      POSTGRES_DB: dvstrapi
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dvcms"]
      interval: 5s
      timeout: 5s
      retries: 10

  strapi:
    build: .
    container_name: dvstrapi-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: "1337"
      DATABASE_CLIENT: postgres
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      DATABASE_NAME: dvstrapi
      DATABASE_USERNAME: dvcms
      DATABASE_PASSWORD: dvcms
      DATABASE_SSL: "false"
      # Generate strong secrets for production (see .env from scaffold):
      APP_KEYS: ${APP_KEYS}
      API_TOKEN_SALT: ${API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      NODE_ENV: production
    ports:
      - "1337:1337"
    volumes:
      - uploads:/app/public/uploads

volumes:
  pgdata:
  uploads:
