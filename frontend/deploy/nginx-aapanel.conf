# Nginx config mẫu cho aaPanel — demo.bioscope.vn
# Website → Config → dán vào trong server { } (thay block location / cũ)

root /www/wwwroot/demo.bioscope.vn;
index index.html;

# Trang chủ → /vi/
location = / {
    return 302 /vi/;
}

# Static export Next.js (trailingSlash: true)
# KHÔNG dùng fallback /index.html — gây redirect loop trên /vi/
location / {
    try_files $uri $uri/ $uri/index.html =404;
}

# Trang 404 của Next
error_page 404 /404.html;

location = /404.html {
    root /www/wwwroot/demo.bioscope.vn;
    internal;
}

# Cache JS/CSS
location /_next/static/ {
    expires 365d;
    add_header Cache-Control "public, immutable";
}
