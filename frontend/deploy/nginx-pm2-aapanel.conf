# Nginx — PM2 + Node (Cách A) — demo.bioscope.vn
# Website → Config → thay TOÀN BỘ block location / cũ
#
# QUAN TRỌNG:
# - KHÔNG dùng try_files (dành cho static export)
# - KHÔNG thêm location /_next/static/ trỏ document root — gây mất CSS/JS
# - Proxy 100% request (kể cả /_next/, /logo.avif, /videos/) về Node

location / {
    proxy_pass http://127.0.0.1:31002;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
}

